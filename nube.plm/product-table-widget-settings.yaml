# Product Table Widget - Settings Schema
# Auto-loaded by PLM plugin backend

schema:
  type: object
  properties:
    # Display Settings
    display:
      type: object
      title: Display Settings
      description: Configure what columns to show
      properties:
        showCode:
          type: boolean
          title: Show Product Code
          description: Display product code column
          default: true
        showStatus:
          type: boolean
          title: Show Status
          description: Display status badge column
          default: true
        showPrice:
          type: boolean
          title: Show Price
          description: Display price column
          default: true
        compactMode:
          type: boolean
          title: Compact Mode
          description: Reduce padding for dense display
          default: false

    # Data Refresh Settings
    refresh:
      type: object
      title: Refresh Settings
      description: Configure data refresh behavior
      properties:
        interval:
          type: number
          title: Refresh Interval (seconds)
          description: How often to reload product data
          default: 30
          minimum: 5
          maximum: 300
        enableAutoRefresh:
          type: boolean
          title: Enable Auto-Refresh
          description: Automatically refresh data at interval
          default: true

  required: []

# Default configuration
defaults:
  display:
    showCode: true
    showStatus: true
    showPrice: true
    compactMode: false
  refresh:
    interval: 30
    enableAutoRefresh: true
