version: 1

nodeTypes:
  # ---------------------------------------------------------------------------
  # PLM Service (extends core.service)
  # ---------------------------------------------------------------------------
  - type: plm.service
    baseType: core.service
    displayName: PLM Service
    description: Project Lifecycle Management service root
    autoPluginId: true
    autoIdentity: [service, plm]

    defaults:
      serviceName: "Project Lifecycle Management"
      serviceType: "plm"
      status: "active"
      version: "2.0"

    validation:
      required: [serviceName]
      rules:
        serviceName:
          pattern: "^[A-Za-z0-9 \\-_]+$"
          message: "Service name must be alphanumeric"
          example: "Project Lifecycle Management"

    uiHints:
      icon: package-search
      color: "#3b82f6"

  # ---------------------------------------------------------------------------
  # PLM Project (extends core.project)
  # ---------------------------------------------------------------------------
  - type: plm.project
    baseType: core.project
    displayName: PLM Project
    description: Project catalog with lifecycle tracking
    autoPluginId: true
    autoIdentity: [project, plm]

    defaults:
      category: "hardware"
      currency: "USD"
      status: "Design"

    validation:
      required: [projectCode]
      rules:
        projectCode:
          message: "Project code must be at least 3 characters"
          example: "edge-001"
        category:
          enum: [hardware, software, project, hybrid, firmware, bundle]
          message: "Invalid category"
        status:
          enum: [Design, Prototype, Production, Discontinued, planned, active, on_hold, completed, cancelled]
          message: "Invalid status"
        price:
          min: 0
          message: "Price must be non-negative"

    # Child node templates - shown in "Add Child" menu
    childTemplates:
      - type: core.folder
        displayName: Bill of Materials (BOM)
        icon: list-tree
        defaults:
          name: "BOM"
          description: "Components and assemblies"

      - type: core.folder
        displayName: Specifications
        icon: file-text
        defaults:
          name: "Specifications"
          description: "Technical specs and documentation"

      - type: core.folder
        displayName: Revisions
        icon: git-branch
        defaults:
          name: "Revisions"
          description: "Design revisions and versions"

      - type: core.folder
        displayName: Manufacturing
        icon: factory
        defaults:
          name: "Manufacturing"
          description: "Assembly and production instructions"

      - type: core.folder
        displayName: Testing
        icon: check-circle
        defaults:
          name: "Testing"
          description: "Test plans and results"

    uiHints:
      icon: package
      color: "#10b981"

  # ---------------------------------------------------------------------------
  # Manufacturing Run (custom type - no core equivalent)
  # ---------------------------------------------------------------------------
  - type: plm.manufacturing-run
    displayName: Manufacturing Run
    description: Production batch tracking for hardware manufacturing
    autoPluginId: true
    autoIdentity: [manufacturing, plm, run]

    defaults:
      runNumber: ""
      hardwareVersion: ""
      targetQuantity: 0
      producedCount: 0
      status: "planned"
      qaFailures: 0

    validation:
      required: [hardwareVersion, targetQuantity]
      rules:
        status:
          enum: [planned, in-progress, qa, completed, cancelled]
          message: "Invalid status"
        targetQuantity:
          min: 1
          message: "Target quantity must be at least 1"

    uiHints:
      icon: factory
      color: "#f59e0b"

  # ---------------------------------------------------------------------------
  # PLM Task (extends core.task)
  # ---------------------------------------------------------------------------
  - type: plm.task
    baseType: core.task
    displayName: Task
    description: Project development task or work item
    autoPluginId: true
    autoIdentity: [task, plm]

    defaults:
      status: "pending"
      priority: "Medium"
      progress: 0
      actualHours: 0

    validation:
      required: []
      rules:
        status:
          enum: [pending, in-progress, blocked, review, completed, cancelled]
          message: "Invalid status"
        priority:
          enum: [Low, Medium, High]
          message: "Invalid priority"
        progress:
          min: 0
          max: 100
          message: "Progress must be between 0-100"
        actualHours:
          min: 0
          message: "Hours must be non-negative"

    # Commands for task operations
    commands:
      - name: listTickets
        description: List all tickets under this task
        method: GET

      - name: recalculateProgress
        description: Recalculate task progress from ticket statuses
        method: POST

    uiHints:
      icon: list-checks
      color: "#8b5cf6"

  # ---------------------------------------------------------------------------
  # PLM Ticket (extends core.ticket)
  # ---------------------------------------------------------------------------
  - type: plm.ticket
    baseType: core.ticket
    displayName: Ticket
    description: Work item, bug, feature request, or chore
    autoPluginId: true
    autoIdentity: [ticket, plm]

    defaults:
      ticketType: "task"
      status: "pending"
      priority: "Medium"
      actualHours: 0

    validation:
      required: []
      rules:
        status:
          enum: [pending, in-progress, blocked, review, completed, cancelled]
          message: "Invalid status"
        priority:
          enum: [Low, Medium, High, Critical]
          message: "Invalid priority"
        ticketType:
          enum: [task, bug, feature, chore]
          message: "Invalid ticket type"
        estimatedHours:
          min: 0
          message: "Hours must be non-negative"
        actualHours:
          min: 0
          message: "Hours must be non-negative"

    # Commands for ticket operations
    commands:
      - name: listTimeEntries
        description: List all time entries for this ticket
        method: GET

      - name: recalculateHours
        description: Recalculate actual hours from time entries
        method: POST

    uiHints:
      icon: check-square
      color: "#6366f1"

# =============================================================================
# Node Profiles - Core types customized by PLM plugin
# =============================================================================
nodeProfiles:
  # ---------------------------------------------------------------------------
  # BOM Item (core.document + plm-bom profile)
  # ---------------------------------------------------------------------------
  - nodeType: core.document
    profile: plm-bom
    displayName: BOM Item
    description: Bill of Materials entry
    identity: [document, bom, plm]

    defaults:
      documentType: "bom-item"

    uiHints:
      icon: component
      color: "#f59e0b"

  # ---------------------------------------------------------------------------
  # Time Entry (core.entry + plm-time-log profile)
  # ---------------------------------------------------------------------------
  - nodeType: core.entry
    profile: plm-time-log
    displayName: Time Entry
    description: Time tracking for work items
    identity: [entry, time-log, plm]

    defaults:
      hours: 0
      category: "development"

    validation:
      required: [date, hours, userId]
      rules:
        hours:
          min: 0
          message: "Hours must be positive"
        date:
          pattern: "^\\d{4}-\\d{2}-\\d{2}(T.*)?$"
          message: "Date must be ISO 8601 format (YYYY-MM-DD)"
        category:
          enum: [development, testing, documentation, meeting, review]
          message: "Invalid category"

    uiHints:
      icon: clock
      color: "#10b981"


  # ---------------------------------------------------------------------------
  # Hardware Unit (core.asset + plm-unit profile)
  # ---------------------------------------------------------------------------
  - nodeType: core.asset
    profile: plm-unit
    displayName: Hardware Unit
    description: Physical hardware unit with serial tracking
    identity: [asset, unit, hardware, plm]

    defaults:
      assetType: "hardware-unit"

    uiHints:
      icon: cpu
      color: "#ef4444"

  # ---------------------------------------------------------------------------
  # Component (core.component + plm-component profile)
  # ---------------------------------------------------------------------------
  - nodeType: core.component
    profile: plm-component
    displayName: PLM Component
    description: Generic component for PLM system
    identity: [component, plm]

    defaults:
      componentType: "generic"

    uiHints:
      icon: box
      color: "#8b5cf6"

  # ---------------------------------------------------------------------------
  # Task (core.task + plm-task profile)
  # ---------------------------------------------------------------------------
  - nodeType: core.task
    profile: plm-task
    displayName: PLM Task
    description: Project development task with kanban workflow
    identity: [task, plm]

    defaults:
      status: pending
      priority: Medium
      assignee: Unassigned

    validation:
      required: [name]
      rules:
        status:
          enum: [pending, in-progress, completed]
          message: "Status must be: pending, in-progress, or completed"
        priority:
          enum: [Low, Medium, High]
          message: "Priority must be: Low, Medium, or High"
        dueDate:
          pattern: "^\\d{4}-\\d{2}-\\d{2}(T.*)?$"
          message: "Due date must be ISO 8601 format (YYYY-MM-DD or full timestamp)"

    uiHints:
      icon: list-checks
      color: "#8b5cf6"
